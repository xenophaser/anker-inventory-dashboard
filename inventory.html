<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Windmar · Anker Inventory</title>
<style>
:root{
  --bg:#0d0d0d;--surface:#161616;--surface2:#1f1f1f;--border:#2a2a2a;--border2:#333;
  --text:#f0ede8;--text2:#888;--text3:#555;
  --accent:#5dca8a;--accent-dark:#0f2a1a;--accent-dim:#2a5a3a;
  --warn:#f0a030;--warn-dark:#2a1a00;
  --danger:#e05555;--danger-dark:#2a0f0f;
  --mono:ui-monospace,SFMono-Regular,"Cascadia Code","Courier New",monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  --r:6px;--rl:10px
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
.hdr{background:#000;border-bottom:1px solid var(--border);padding:0 2rem;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo{font-family:var(--mono);font-size:13px;letter-spacing:.08em;display:flex;align-items:center;gap:10px;color:var(--text)}
.dot{width:8px;height:8px;background:var(--accent);border-radius:50%;animation:blink 2.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.badge-ro{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--border2);color:var(--text3)}
.main{max-width:1100px;margin:0 auto;padding:1.5rem 2rem}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:1rem 1.25rem}
.stat .lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.stat .val{font-size:26px;font-weight:500;font-family:var(--mono)}
.green{color:var(--accent)}.red{color:var(--danger)}.orange{color:var(--warn)}
.sr{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.sr input,.sr select{font-family:var(--sans);font-size:13px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);padding:8px 12px;color:var(--text);outline:none}
.sr input{flex:1}
.sr input:focus,.sr select:focus{border-color:var(--accent)}
.sr input::placeholder{color:var(--text3)}
.sr select option{background:var(--surface2)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{text-align:left;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:8px 10px;border-bottom:1px solid var(--border);font-weight:500}
tbody td{padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text)}
tbody tr:hover{background:var(--surface2)}
tbody tr:last-child td{border-bottom:none}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500;font-family:var(--mono)}
.badge.in-stock{background:var(--accent-dark);color:var(--accent)}
.badge.dispatched{background:var(--danger-dark);color:var(--danger)}
.badge.rma{background:var(--warn-dark);color:var(--warn)}
.loc-badge{display:inline-block;font-family:var(--mono);font-size:11px;padding:2px 8px;border-radius:4px;background:#1a2a3a;color:#7aabdd;border:1px solid #2a4a5a}
.loc-badge.empty{color:var(--text3);border:1px dashed var(--border2);background:transparent}
.qty-badge{display:inline-block;font-family:var(--mono);font-size:11px;padding:2px 8px;border-radius:4px;background:var(--accent-dark);color:var(--accent);border:1px solid var(--accent-dim)}
.empty{text-align:center;padding:3rem;color:var(--text3);font-size:13px}
#sync-indicator{font-family:var(--mono);font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px}
#sync-dot{width:6px;height:6px;border-radius:50%;background:var(--text3)}
#sync-dot.syncing{background:var(--warn);animation:blink .8s infinite}
#sync-dot.ok{background:var(--accent)}
#sync-dot.err{background:var(--danger)}
.btn{padding:8px 16px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface2);cursor:pointer;font-size:13px;font-family:var(--sans);color:var(--text);transition:all .15s;font-weight:500}
.btn:hover{background:var(--border)}
.btn.sm{padding:5px 11px;font-size:12px}
.btn.gh{border-color:var(--border);background:transparent;color:var(--text2)}
.btn.gh:hover{background:var(--surface2);color:var(--text)}
.drill-hdr{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid var(--border);background:var(--surface2)}
.updated{font-size:11px;color:var(--text3);text-align:right;padding:8px 12px;border-top:1px solid var(--border)}
@media(max-width:768px){.stats{grid-template-columns:repeat(2,1fr)}.main{padding:1rem}.hdr{padding:0 1rem}}
</style>
</head>
<body>

<header class="hdr">
  <div class="logo"><div class="dot"></div>WINDMAR · ANKER — Inventory</div>
  <div style="display:flex;align-items:center;gap:10px">
    <div id="sync-indicator"><div id="sync-dot"></div><span id="sync-label">loading...</span></div>
    <span class="badge-ro">👁 View only</span>
  </div>
</header>

<main class="main">
  <div class="stats">
    <div class="stat"><div class="lbl">Total units</div><div class="val" id="s-total">—</div></div>
    <div class="stat"><div class="lbl">In stock</div><div class="val green" id="s-stock">—</div></div>
    <div class="stat"><div class="lbl">Dispatched</div><div class="val red" id="s-disp">—</div></div>
    <div class="stat"><div class="lbl">RMA</div><div class="val orange" id="s-rma">—</div></div>
  </div>

  <div class="sr">
    <input type="text" id="f-search" placeholder="Search model or serial…" oninput="renderInv()"/>
    <select id="f-status" onchange="renderInv()">
      <option value="">All statuses</option>
      <option value="in-stock">In stock</option>
      <option value="dispatched">Dispatched</option>
      <option value="rma">RMA</option>
    </select>
    <button class="btn sm gh" onclick="clearFilters()">✕ Clear</button>
  </div>

  <div class="card"><div class="tw" id="inv-tbl"><div class="empty">Loading…</div></div></div>
  <div class="updated" id="last-updated"></div>
</main>

<script>
var SB_URL = "https://sxwtqrxpqonyqkalcyuj.supabase.co";
var SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN4d3RxcnhwcW9ueXFrYWxjeXVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NTQxMzQsImV4cCI6MjA5MzIzMDEzNH0.PXiX55-3lhwAf5rSoUPl3A2b5PgThjRw5oNBd50IC9E";
var HEADERS = {"Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY};

var NO_SERIAL_SKUS = ['A24V5011','A24V7011','A17U1111','A24U2011','A17U7111'];
function isNoSerial(skuCode){ return NO_SERIAL_SKUS.indexOf(skuCode) >= 0; }

var inv = [];
var noSerialItems = [];
var drillSku = null;

function setSyncStatus(s, l) {
  document.getElementById("sync-dot").className = s;
  document.getElementById("sync-label").textContent = l;
}
function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function fd(ts) {
  if (!ts) return "—";
  var d = new Date(ts);
  return d.toLocaleDateString("en-US", {month:"short",day:"numeric"}) + " " +
         d.toLocaleTimeString("en-US", {hour:"2-digit",minute:"2-digit"});
}

function fetchAllInventory(offset, acc) {
  offset = offset || 0; acc = acc || [];
  return fetch(SB_URL + "/rest/v1/inventory?order=sku.asc&limit=3000&offset=" + offset, {headers: HEADERS})
    .then(function(r) { return r.json(); })
    .then(function(rows) {
      acc = acc.concat(rows);
      if (rows.length === 3000) return fetchAllInventory(offset + 3000, acc);
      return acc;
    });
}

function loadData() {
  setSyncStatus("syncing", "loading...");
  fetchAllInventory()
    .then(function(rows) {
      noSerialItems = rows.filter(function(x){ return isNoSerial(x.sku_code||""); })
        .map(function(x){ return {sku:x.sku, skuCode:x.sku_code||"", quantity:x.quantity||0}; });
      inv = rows.filter(function(x){ return !isNoSerial(x.sku_code||""); })
        .map(function(x) {
          return {serial:x.serial, sku:x.sku, skuCode:x.sku_code||"", status:x.status,
                  location:x.location||"", updatedAt:x.updated_at};
        });
      var nsTotal = noSerialItems.reduce(function(a,i){ return a + i.quantity; }, 0);
      setSyncStatus("ok", (inv.length + nsTotal) + " units");
      document.getElementById("last-updated").textContent =
        "Last updated: " + new Date().toLocaleTimeString("en-US", {hour:"2-digit",minute:"2-digit"});
      stats();
      renderInv();
    })
    .catch(function(e) {
      setSyncStatus("err", "offline");
      document.getElementById("inv-tbl").innerHTML = "<div class='empty'>Connection error — try refreshing</div>";
    });
}

function stats() {
  var nsTotal = noSerialItems.reduce(function(a,i){ return a + i.quantity; }, 0);
  document.getElementById("s-total").textContent = inv.length + nsTotal;
  document.getElementById("s-stock").textContent = inv.filter(function(i){return i.status==="in-stock";}).length + nsTotal;
  document.getElementById("s-disp").textContent = inv.filter(function(i){return i.status==="dispatched";}).length;
  document.getElementById("s-rma").textContent = inv.filter(function(i){return i.status==="rma";}).length;
}

function clearFilters() {
  document.getElementById("f-search").value = "";
  document.getElementById("f-status").value = "";
  drillSku = null;
  renderInv();
}

function renderInv() {
  var sq = document.getElementById("f-search").value.toLowerCase();
  var sf = document.getElementById("f-status").value;
  var wrap = document.getElementById("inv-tbl");

  if (drillSku) {
    // Check if it's a no-serial item
    var nsItem = noSerialItems.find(function(i){ return i.sku === drillSku; });
    if (nsItem) {
      wrap.innerHTML =
        "<div class='drill-hdr'>" +
        "<button class='btn sm gh' onclick='drillSku=null;renderInv()'>← Back</button>" +
        "<span style='font-weight:600;font-size:14px'>" + esc(drillSku) + "</span>" +
        "<span style='font-family:var(--mono);font-size:11px;color:var(--text3)'>" + esc(nsItem.skuCode) + "</span>" +
        "</div>" +
        "<div style='padding:1.5rem;text-align:center'>" +
        "<div style='font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px'>Quantity in stock</div>" +
        "<div style='font-size:48px;font-weight:700;font-family:var(--mono);color:var(--accent)'>" + nsItem.quantity + "</div>" +
        "<div style='font-size:12px;color:var(--text3);margin-top:8px'>No individual serials — tracked by quantity</div>" +
        "</div>";
      return;
    }
    var items = inv.filter(function(i){ return i.sku === drillSku; });
    if (sf) items = items.filter(function(i){ return i.status === sf; });
    if (sq) items = items.filter(function(i){
      return i.serial.toLowerCase().indexOf(sq) >= 0 || i.location.toLowerCase().indexOf(sq) >= 0;
    });
    var skuCode = items.length > 0 && items[0].skuCode ?
      " <span style='font-family:var(--mono);font-size:11px;color:var(--text3)'>" + esc(items[0].skuCode) + "</span>" : "";
    var rows = items.map(function(i) {
      var lbl = i.status === "in-stock" ? "In stock" : i.status === "dispatched" ? "Out" : "RMA";
      var lb = i.location ?
        "<span class='loc-badge'>📍 " + esc(i.location) + "</span>" :
        "<span class='loc-badge empty'>—</span>";
      return "<tr><td style='font-family:var(--mono);font-size:12px'>" + esc(i.serial) +
             "</td><td><span class='badge " + i.status + "'>" + lbl + "</span></td>" +
             "<td>" + lb + "</td>" +
             "<td style='font-size:11px;color:var(--text3)'>" + fd(i.updatedAt) + "</td></tr>";
    });
    wrap.innerHTML =
      "<div class='drill-hdr'>" +
      "<button class='btn sm gh' onclick='drillSku=null;renderInv()'>← Back</button>" +
      "<span style='font-weight:600;font-size:14px'>" + esc(drillSku) + "</span>" + skuCode +
      "<span style='color:var(--text3);font-size:12px'>" + items.length + " serials</span></div>" +
      "<table><thead><tr><th>Serial</th><th style='width:90px'>Status</th>" +
      "<th style='width:150px'>Location</th><th style='width:120px'>Updated</th></tr></thead>" +
      "<tbody>" + rows.join("") + "</tbody></table>";
    return;
  }

  var groups = {};
  inv.forEach(function(i) {
    if (!groups[i.sku]) groups[i.sku] = {sku:i.sku, skuCode:i.skuCode||"", total:0, stock:0, dispatched:0, rma:0, noSerial:false};
    groups[i.sku].total++;
    if (i.status === "in-stock") groups[i.sku].stock++;
    else if (i.status === "dispatched") groups[i.sku].dispatched++;
    else if (i.status === "rma") groups[i.sku].rma++;
  });
  // Añadir no-serial items al grupo
  noSerialItems.forEach(function(i) {
    groups[i.sku] = {sku:i.sku, skuCode:i.skuCode, total:i.quantity, stock:i.quantity, dispatched:0, rma:0, noSerial:true, quantity:i.quantity};
  });

  var skus = Object.keys(groups);
  if (sq) skus = skus.filter(function(k){
    return k.toLowerCase().indexOf(sq) >= 0 ||
           inv.some(function(i){ return i.sku === k && i.serial.toLowerCase().indexOf(sq) >= 0; });
  });
  if (sf) skus = skus.filter(function(k){
    if (sf === "in-stock") return groups[k].stock > 0;
    if (sf === "dispatched") return groups[k].dispatched > 0;
    if (sf === "rma") return groups[k].rma > 0;
    return true;
  });

  if (!skus.length) { wrap.innerHTML = "<div class='empty'>No items found</div>"; return; }

  wrap.innerHTML = "<table><thead><tr>" +
    "<th>Model</th><th style='width:70px'>Total</th>" +
    "<th style='width:120px'>In stock</th><th style='width:120px'>Dispatched</th><th style='width:70px'>RMA</th>" +
    "</tr></thead><tbody>" +
    skus.map(function(k) {
      var g = groups[k];
      var s, d, r;
      if (g.noSerial) {
        s = "<span class='qty-badge'>qty: " + g.quantity + "</span>";
        d = "<span style='color:var(--text3)'>—</span>";
        r = "<span style='color:var(--text3)'>—</span>";
      } else {
        s = g.stock > 0 ? "<span style='font-family:var(--mono);font-size:22px;font-weight:700;color:var(--accent)'>" + g.stock + "</span>" :
            "<span style='font-family:var(--mono);font-size:22px;color:var(--text3)'>0</span>";
        d = g.dispatched > 0 ? "<span style='font-family:var(--mono);font-size:22px;font-weight:700;color:var(--danger)'>" + g.dispatched + "</span>" :
            "<span style='font-family:var(--mono);font-size:22px;color:var(--text3)'>0</span>";
        r = g.rma > 0 ? "<span class='badge rma'>" + g.rma + "</span>" : "<span style='color:var(--text3)'>0</span>";
      }
      return "<tr style='cursor:pointer' onclick='drillSku=\"" + esc(k) + "\";renderInv()'>" +
        "<td><span style='font-weight:600;font-size:14px'>" + esc(k) + "</span><br>" +
        "<span style='font-family:var(--mono);font-size:11px;color:var(--text3)'>" + esc(g.skuCode) + "</span></td>" +
        "<td style='font-family:var(--mono);color:var(--text3)'>" + g.total + "</td>" +
        "<td>" + s + "</td><td>" + d + "</td><td>" + r + "</td></tr>";
    }).join("") + "</tbody></table>";
}

loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
